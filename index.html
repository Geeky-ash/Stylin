<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Stylin' — AI-powered fashion discovery. Upload a photo and instantly discover styles, trends, and curated product recommendations." />
  <meta name="theme-color" content="#0A84FF" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Stylin' — AI Fashion Discovery</title>
  <link rel="stylesheet" href="index.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>" />
</head>
<body>

  <div id="app">

    <!-- ========== Status Bar (Cosmetic) ========== -->
    <div class="status-bar">
      <span class="status-bar__time" id="statusTime">11:08</span>
      <div class="status-bar__icons">
        <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
        <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4zM13 18h-2v-2h2v2zm0-4h-2V9h2v5z"/></svg>
      </div>
    </div>

    <!-- ========== Top Navigation ========== -->
    <nav class="top-nav">
      <div class="top-nav__brand">
        <div class="top-nav__logo">
          <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        <h1 class="top-nav__title">Stylin'</h1>
      </div>
      <div class="top-nav__actions">
        <button class="top-nav__btn" id="btnSearch" aria-label="Search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <button class="top-nav__btn" id="btnNotifications" aria-label="Notifications">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="top-nav__badge"></span>
        </button>
      </div>
    </nav>

    <div class="content-area">

      <!-- ========== Scanner / Camera Area ========== -->
      <section class="scanner" id="scannerArea">
        <img
          class="scanner__image"
          id="scannerImage"
          src="assets/hero_outfit.png"
          alt="Fashion outfit being analyzed by AI"
        />

        <!-- Overlay -->
        <div class="scanner__overlay">
          <div class="scanner__corner scanner__corner--tl"></div>
          <div class="scanner__corner scanner__corner--tr"></div>
          <div class="scanner__corner scanner__corner--bl"></div>
          <div class="scanner__corner scanner__corner--br"></div>
          <div class="scanner__laser" id="scannerLaser"></div>
        </div>

        <!-- Upload overlay -->
        <div class="scanner__upload" id="uploadOverlay">
          <div class="scanner__upload-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
          </div>
          <span class="scanner__upload-text">Tap to upload or drag a photo</span>
        </div>

        <input type="file" accept="image/*" class="scanner__file-input" id="fileInput" />

        <!-- Status Badge -->
        <div class="scanner__status">
          <span class="scanner__status-dot"></span>
          <span id="statusText">AI Analyzing Style...</span>
        </div>
      </section>

      <!-- ========== Detected Styles ========== -->
      <section class="detected-styles" id="detectedStyles">
        <div class="section-header">
          <h2 class="section-title">
            <svg class="section-title__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
            </svg>
            Detected Styles
          </h2>
          <a href="#" class="section-link">See All</a>
        </div>
        <div class="style-tags" id="styleTags">
          <!-- Rendered by JS -->
        </div>
      </section>

      <!-- ========== AI Insight Banner ========== -->
      <div class="ai-banner" id="aiBanner">
        <div class="ai-banner__icon">
          <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm1 17.93c-3.95.49-7.43-2.99-6.94-6.94C6.53 9.21 10.07 6.53 13.93 7.06c3.21.44 5.57 3.21 5.57 6.46 0 3.87-3.37 6.93-7.5 6.41zM12 8v4l3 3"/></svg>
        </div>
        <div class="ai-banner__content">
          <div class="ai-banner__title">✨ Style Match: 94% Minimalist</div>
          <div class="ai-banner__desc">Your look aligns with Clean Minimalist trends. Here are curated picks that match your vibe.</div>
        </div>
      </div>

      <!-- ========== Product Recommendations ========== -->
      <section class="recommendations" id="recommendations">
        <div class="section-header">
          <h2 class="section-title">
            <svg class="section-title__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
              <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
            </svg>
            Shop Similar
          </h2>
          <a href="#" class="section-link">View All</a>
        </div>
        <div class="product-grid" id="productGrid">
          <!-- Rendered by JS -->
        </div>
      </section>

    </div><!-- .content-area -->

    <!-- ========== Floating Action Button ========== -->
    <button class="fab" id="fabCamera" aria-label="Open Camera">
      <span class="fab__ripple"></span>
      <svg viewBox="0 0 24 24"><path d="M12 15.2A3.2 3.2 0 1 0 12 8.8a3.2 3.2 0 0 0 0 6.4z"/><path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9z"/></svg>
    </button>

    <!-- ========== Bottom Tab Bar ========== -->
    <nav class="tab-bar">
      <button class="tab-bar__item active" data-tab="discover">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
        <span>Discover</span>
      </button>
      <button class="tab-bar__item" data-tab="wardrobe">
        <svg viewBox="0 0 24 24"><path d="M20.38 3.46L16 2 12 5.5 8 2 3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.47a1 1 0 0 0 .99.84H6v10h12V10h2.15a1 1 0 0 0 .99-.84l.58-3.47a2 2 0 0 0-1.34-2.23z"/></svg>
        <span>Wardrobe</span>
      </button>
      <button class="tab-bar__item" data-tab="trending">
        <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <span>Trending</span>
      </button>
      <button class="tab-bar__item" data-tab="profile">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Profile</span>
      </button>
    </nav>

    <!-- ========== Toast ========== -->
    <div class="toast" id="cartToast">
      <svg class="toast__icon" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      <span id="toastMessage">Added to cart!</span>
    </div>

  </div><!-- #app -->

  <script src="app.js"></script>
</body>
</html>
